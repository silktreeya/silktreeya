<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 및 문의 | 프로젝트 매니저</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="nav-brand">프로젝트 매니저</a>
    <div class="nav-links">
        <a href="index.html">홈</a>
        <a href="about.html">소개</a>
        <a href="contact.html">문의</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
            </svg>
        </button>
    </div>
</nav>

<div class="layout-wrapper">
    <main>
        <div class="breadcrumbs">
            <a href="index.html">홈</a> &gt; <span>제휴 및 문의</span>
        </div>

        <div class="container">
            <header class="issue-header">
                <h1 class="issue-title">제휴 및 문의</h1>
            </header>

            <div class="issue-content">
                <div class="description">
                    <p>프로젝트 매니저 서비스와 관련된 제휴 제안이나 일반 문의사항이 있으시면 아래 양식을 통해 연락 주시기 바랍니다. 영업일 기준 2~3일 내에 답변 드립니다.</p>
                </div>

                <section class="partnership-form">
                    <form action="https://formspree.io/f/xojpedqj" method="POST" class="contact-form">
                        <div class="form-group">
                            <label for="name">성함 / 업체명</label>
                            <input type="text" id="name" name="name" placeholder="홍길동 (주식회사 OOO)" required>
                        </div>
                        <div class="form-group">
                            <label for="email">이메일 주소</label>
                            <input type="email" id="email" name="_replyto" placeholder="example@domain.com" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">문의 제목</label>
                            <input type="text" id="subject" name="subject" placeholder="제휴 제안 건" required>
                        </div>
                        <div class="form-group">
                            <label for="message">문의 내용</label>
                            <textarea id="message" name="message" rows="5" placeholder="상세 내용을 입력해주세요." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">문의 보내기</button>
                    </form>
                </section>
            </div>

            <footer class="actions">
                <a href="index.html" class="btn btn-outline">홈으로 돌아가기</a>
            </footer>
        </div>
    </main>

    <aside class="sidebar">
        <div class="sidebar-widget">
            <h3 class="widget-title">고객 센터</h3>
            <p style="font-size: 0.9rem; color: var(--text-sub);">평일 09:00 ~ 18:00 (주말 및 공휴일 휴무)</p>
        </div>
    </aside>
</div>

<footer class="main-footer">
    <div class="footer-links">
        <a href="about.html">소개</a>
        <a href="privacy.html">개인정보 처리방침</a>
        <a href="terms.html">이용약관</a>
        <a href="contact.html">제휴 문의</a>
    </div>
    <p class="copyright">&copy; 2026 프로젝트 매니저. All rights reserved.</p>
</footer>

</body>
</html>
